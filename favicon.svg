<?xml version="1.0" encoding="UTF-8"?>
<!-- Spaniel favicon: pixel-art silhouette in the collection's palette.
     SVG keeps the 24×24 native art sharp at any browser-favicon size
     (16, 32, 48, etc.) without per-resolution PNG variants. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <!-- Background: sage wall, matching the gallery default. -->
  <rect width="24" height="24" fill="#9bbd99"/>
  <!-- Body silhouette (golden cocker). Pixelated approximation. -->
  <g fill="#d99a4b">
    <rect x="6" y="9" width="11" height="9"/>
    <rect x="5" y="11" width="1" height="6"/>
    <rect x="17" y="11" width="1" height="6"/>
    <rect x="9" y="18" width="2" height="2"/>
    <rect x="13" y="18" width="2" height="2"/>
  </g>
  <!-- Head + ears. -->
  <g fill="#c68638">
    <rect x="8" y="5" width="8" height="5"/>
    <rect x="6" y="6" width="2" height="6"/>
    <rect x="16" y="6" width="2" height="6"/>
  </g>
  <!-- Muzzle. -->
  <rect x="10" y="9" width="4" height="3" fill="#e8b566"/>
  <!-- Eyes. -->
  <rect x="9" y="7" width="2" height="2" fill="#1a1a1a"/>
  <rect x="13" y="7" width="2" height="2" fill="#1a1a1a"/>
  <!-- Nose. -->
  <rect x="11" y="10" width="2" height="1" fill="#1a1a1a"/>
</svg>
